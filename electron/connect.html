<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Amux — Connect</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #0d1117; color: #e6edf3;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; -webkit-app-region: drag;
    }
    .container { width: 380px; -webkit-app-region: no-drag; }
    h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 6px; letter-spacing: -0.02em; }
    .subtitle { color: #8b949e; font-size: 0.85rem; margin-bottom: 28px; }
    .input-row { display: flex; gap: 8px; margin-bottom: 20px; }
    input[type="text"] {
      flex: 1; padding: 10px 14px; border-radius: 8px;
      border: 1px solid #30363d; background: #161b22; color: #e6edf3;
      font-size: 0.9rem; outline: none; font-family: inherit;
    }
    input[type="text"]:focus { border-color: #58a6ff; }
    input[type="text"]::placeholder { color: #484f58; }
    .btn {
      padding: 10px 20px; border-radius: 8px; border: none;
      font-size: 0.85rem; font-weight: 600; cursor: pointer;
      font-family: inherit; transition: background 0.15s;
    }
    .btn-primary { background: #238636; color: #fff; }
    .btn-primary:hover { background: #2ea043; }
    .btn-primary:active { background: #238636; }
    .divider { border-top: 1px solid #21262d; margin: 4px 0 16px; }
    .section-label { font-size: 0.75rem; color: #8b949e; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
    .conn-list { display: flex; flex-direction: column; gap: 4px; }
    .conn-item {
      display: flex; align-items: center; gap: 10px; padding: 10px 12px;
      background: #161b22; border: 1px solid #21262d; border-radius: 8px;
      cursor: pointer; transition: border-color 0.15s;
    }
    .conn-item:hover { border-color: #58a6ff; }
    .conn-name { font-size: 0.88rem; font-weight: 600; }
    .conn-url { font-size: 0.72rem; color: #8b949e; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .conn-info { flex: 1; min-width: 0; }
    .conn-remove {
      background: none; border: none; color: #484f58; cursor: pointer;
      font-size: 1rem; padding: 4px; border-radius: 4px; line-height: 1;
      opacity: 0; transition: opacity 0.15s, color 0.15s;
    }
    .conn-item:hover .conn-remove { opacity: 1; }
    .conn-remove:hover { color: #f85149; }
    .conn-last { font-size: 0.65rem; color: #58a6ff; flex-shrink: 0; }
    .empty { color: #484f58; font-size: 0.82rem; text-align: center; padding: 20px 0; }
    .error { color: #f85149; font-size: 0.78rem; margin-top: 6px; min-height: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>amux</h1>
    <div class="subtitle">Connect to an amux server</div>
    <div class="input-row">
      <input type="text" id="url-input" placeholder="https://localhost:8822" autofocus
        onkeydown="if(event.key==='Enter')doConnect()">
      <button class="btn btn-primary" onclick="doConnect()">Connect</button>
    </div>
    <div class="error" id="error"></div>
    <div class="divider"></div>
    <div class="section-label">Recent connections</div>
    <div class="conn-list" id="conn-list">
      <div class="empty">No saved connections</div>
    </div>
  </div>
  <script>
    let config = { connections: [], lastUrl: '' };

    window.amux.onConfig((cfg) => {
      config = cfg;
      renderList();
      // Pre-fill with last URL
      if (config.lastUrl) {
        document.getElementById('url-input').value = config.lastUrl;
      }
    });

    function renderList() {
      const el = document.getElementById('conn-list');
      if (!config.connections.length) {
        el.innerHTML = '<div class="empty">No saved connections</div>';
        return;
      }
      el.innerHTML = config.connections.map(c => {
        const isLast = c.url.replace(/\/+$/, '') === config.lastUrl.replace(/\/+$/, '');
        return `<div class="conn-item" onclick="connectTo('${esc(c.url)}')">
          <div class="conn-info">
            <div class="conn-name">${esc(c.name)}</div>
            <div class="conn-url">${esc(c.url)}</div>
          </div>
          ${isLast ? '<span class="conn-last">last used</span>' : ''}
          <button class="conn-remove" onclick="event.stopPropagation();removeConn('${esc(c.url)}')" title="Remove">&#x2715;</button>
        </div>`;
      }).join('');
    }

    function esc(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    function doConnect() {
      const input = document.getElementById('url-input');
      let url = input.value.trim();
      if (!url) {
        url = 'https://localhost:8822';
        input.value = url;
      }
      // Ensure protocol
      if (!/^https?:\/\//.test(url)) url = 'https://' + url;
      document.getElementById('error').textContent = '';
      window.amux.connect(url);
    }

    function connectTo(url) {
      window.amux.connect(url);
    }

    function removeConn(url) {
      window.amux.removeConnection(url);
    }
  </script>
</body>
</html>
